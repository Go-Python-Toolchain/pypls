version: 2

project_name: pypls

before:
  hooks:
    - go mod tidy

builds:
  - id: pypls
    main: .
    binary: pypls
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/Go-Python-Toolchain/pypls/cmd.version={{ .Version }}
      - -X github.com/Go-Python-Toolchain/pypls/cmd.commit={{ .Commit }}
      - -X github.com/Go-Python-Toolchain/pypls/cmd.date={{ .Date }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: Go-Python-Toolchain
    name: pypls
